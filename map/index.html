  <main class="container">
    
<section class="card">
  <h1>Map</h1>
  <p>Places I’ve lived, studied, and worked.</p>

  <div id="mapPage" class="map-big" style="height:520px; border-radius:14px; overflow:hidden;"></div>
</section>

<script>
window.addEventListener("load", function () {
  if (!window.L) return;

  const el = document.getElementById("mapPage");
  if (!el) return;

  const map = L.map("mapPage").setView([20, 0], 2);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: "© OpenStreetMap"
  }).addTo(map);

  const places = [
    { name: "Williamsburg, VA", coords: [37.2707, -76.7075] },
    { name: "Washington, DC", coords: [38.9072, -77.0369] },
    { name: "Seoul, South Korea", coords: [37.5665, 126.9780] },
    { name: "Tokyo, Japan", coords: [35.6762, 139.6503] }
  ];

  const markers = places.map(p => L.marker(p.coords).addTo(map).bindPopup(p.name));

  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds().pad(0.25));

  setTimeout(() => map.invalidateSize(), 150);
});
</script>
